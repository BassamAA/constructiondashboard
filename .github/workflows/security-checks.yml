name: Security Checks

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "infrastructure/**"
      - "backend/Dockerfile"
      - ".github/workflows/security-checks.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "infrastructure/**"
      - "backend/Dockerfile"
      - ".github/workflows/security-checks.yml"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy (repo scan)
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            aquasec/trivy:0.56.1 \
            fs \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            /workspace

  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:v8.24.2 \
            detect \
            --source=/repo \
            --no-git \
            --verbose
