name: Security Checks

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "infrastructure/**"
      - "backend/Dockerfile"
      - ".github/workflows/security-checks.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "infrastructure/**"
      - "backend/Dockerfile"
      - ".github/workflows/security-checks.yml"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy (repo scan)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
