name: Build and Deploy AWS

on:
  push:
    branches:
      - main
      - feat/aws-ops-revamp
    paths:
      - "backend/**"
      - "frontend/**"
      - "infrastructure/terraform/**"
      - "backend/Dockerfile"
      - ".github/workflows/deploy-aws.yml"
  workflow_dispatch:
    inputs:
      target_env:
        description: "Deployment target"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  TF_STATE_REGION: ${{ vars.TF_STATE_REGION }}

permissions:
  contents: read
  id-token: write

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: construction_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d construction_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/construction_test?schema=public
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/construction_test?schema=public
      TEST_DB_MIGRATE: "true"
      TEST_DB_TEARDOWN: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run API tests
        run: npm test

  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_BASE: https://example.com
        run: npm run build

  build-push-image:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    outputs:
      image_uri: ${{ steps.image_meta.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${ECR_REPOSITORY}" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "${ECR_REPOSITORY}" >/dev/null

      - name: Build image metadata
        id: image_meta
        run: |
          if [ -z "${AWS_REGION}" ] || [ -z "${ECR_REPOSITORY}" ]; then
            echo "AWS_REGION and ECR_REPOSITORY must be set as GitHub repository variables."
            exit 1
          fi
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_TAG="sha-${GITHUB_SHA::12}"
          IMAGE_URI="$ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:$IMAGE_TAG"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.image_meta.outputs.image_uri }}
          build-args: |
            VITE_API_BASE=${{ vars.VITE_API_BASE }}

  deploy-staging:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target_env == 'staging')
    runs-on: ubuntu-latest
    needs: [build-push-image]
    environment: staging

    defaults:
      run:
        working-directory: infrastructure/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (remote state)
        run: |
          if [ -z "${TF_STATE_REGION}" ]; then
            echo "TF_STATE_REGION must be set as a GitHub repository variable."
            exit 1
          fi
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=construction-dashboard/staging/terraform.tfstate" \
            -backend-config="region=${{ env.TF_STATE_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Apply (staging)
        env:
          TF_VAR_admin_bootstrap_token: ${{ secrets.ADMIN_BOOTSTRAP_TOKEN_STAGING }}
        run: |
          terraform apply -auto-approve \
            -var-file=environments/staging.tfvars \
            -var="ecr_image_identifier=${{ needs.build-push-image.outputs.image_uri }}"

  deploy-prod:
    if: github.event_name == 'workflow_dispatch' && inputs.target_env == 'prod'
    runs-on: ubuntu-latest
    needs: [build-push-image]
    environment: production

    defaults:
      run:
        working-directory: infrastructure/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (remote state)
        run: |
          if [ -z "${TF_STATE_REGION}" ]; then
            echo "TF_STATE_REGION must be set as a GitHub repository variable."
            exit 1
          fi
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=construction-dashboard/prod/terraform.tfstate" \
            -backend-config="region=${{ env.TF_STATE_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Apply (prod)
        env:
          TF_VAR_admin_bootstrap_token: ${{ secrets.ADMIN_BOOTSTRAP_TOKEN_PROD }}
        run: |
          terraform apply -auto-approve \
            -var-file=environments/prod.tfvars \
            -var="ecr_image_identifier=${{ needs.build-push-image.outputs.image_uri }}"
