name: Frontend E2E

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/frontend-e2e.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/frontend-e2e.yml"
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: construction_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d construction_e2e"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/construction_e2e?schema=public
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/construction_e2e?schema=public
      PORT: "4000"
      CORS_ORIGIN: http://localhost:5173
      ADMIN_BOOTSTRAP_TOKEN: e2e-bootstrap-token
      FRONTEND_URL: http://localhost:5173
      BACKEND_URL: http://localhost:4000
      VITE_API_BASE: http://localhost:4000
      E2E_EMAIL: e2e-admin@example.com
      E2E_PASSWORD: Password123!
      E2E_BOOTSTRAP_TOKEN: e2e-bootstrap-token

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Apply database migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        run: npm run dev > /tmp/backend.log 2>&1 &

      - name: Start frontend
        working-directory: frontend
        run: npm run dev -- --host 0.0.0.0 > /tmp/frontend.log 2>&1 &

      - name: Wait for app
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:4000/health >/dev/null && curl -fsS http://localhost:5173 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend log:"
          cat /tmp/backend.log || true
          echo "Frontend log:"
          cat /tmp/frontend.log || true
          exit 1

      - name: Run Playwright smoke suite
        working-directory: frontend
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report

      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: /tmp/backend.log

      - name: Upload frontend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-log
          path: /tmp/frontend.log
