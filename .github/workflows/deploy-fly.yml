name: Deploy to Fly.io

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "fly.toml"
      - ".github/workflows/deploy-fly.yml"
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: construction_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d construction_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/construction_test?schema=public
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/construction_test?schema=public
      TEST_DB_MIGRATE: "true"
      TEST_DB_TEARDOWN: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run API tests
        run: npm test

  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_BASE: https://alassaad.fly.dev
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: fly deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
